    <circle cx="1000" cy="235" r="150" stroke-width="26"/>
    <line x1="1106" y1="341" x2="1215" y2="450" stroke-width="34" stroke-linecap="round"/>
  </g>
  <!-- accreditation badge -->
  <rect x="80" y="66" width="520" height="50" rx="25" fill="#132e4f" stroke="#33507a"/>
  <text x="104" y="99" fill="#9db4d0" font-size="23" font-weight="700">&#10003; ETM-Tax Agent Office [ETM-TAO], Inc.</text>
  <!-- wordmark -->
  <text x="76" y="258" font-size="122" font-weight="800" letter-spacing="-3">
    <tspan fill="#ffffff">Taga</tspan><tspan fill="#1f51ff">Ligtas</tspan>
  </text>
  <!-- tagline -->
  <text x="82" y="342" fill="#87ab69" font-size="48" font-weight="800">No areglo. We use the law.</text>
